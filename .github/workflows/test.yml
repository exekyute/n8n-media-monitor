name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check workflow JSON in sync with lib
        run: npm run check
      - name: Self-test
        run: node tests/selftest.mjs
      - name: Smoke test
        run: node tests/smoke-workflow.mjs
